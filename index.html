<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Pulse - AI-Powered Business Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --jane-teal: #3eb1a8;
            --jane-teal-dark: #359990;
            --text-dark: #2d3748;
            --text-secondary: #5a6a7a;
            --bg-cream: #faf9f7;
            --white: #ffffff;
            --border: #e8e6e1;
        }

        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 32px 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--jane-teal);
            text-decoration: none;
        }

        .hero {
            padding: 80px 0 120px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .hero p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .waitlist-form {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .waitlist-form input {
            flex: 1;
            min-width: 220px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--white);
        }

        .waitlist-form input:focus {
            outline: none;
            border-color: var(--jane-teal);
        }

        .btn {
            padding: 14px 28px;
            background: var(--jane-teal);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--jane-teal-dark);
        }

        .form-note {
            margin-top: 16px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        footer {
            padding: 40px 0;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }

            .waitlist-form {
                flex-direction: column;
            }

            .waitlist-form input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo">Jane Pulse</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>AI-powered insights for your clinic</h1>
                <p>Connect your Jane account and get a clear view of your revenue, scheduling, and patient retention — in plain language.</p>
                
                <form class="waitlist-form" id="waitlist-form">
                    <input type="email" placeholder="Enter your email" required>
                    <button type="submit" class="btn">Join Waitlist</button>
                </form>
                <p class="form-note">We'll let you know when it's ready.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            © 2026 Jane Pulse
        </div>
    </footer>

    <script>
        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input').value;
            alert('Thanks! We\'ll be in touch at ' + email);
            this.querySelector('input').value = '';
        });
    </script>
</body>
</html>
